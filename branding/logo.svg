<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="cup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6f42c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d1f6e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Coffee cup body -->
  <rect x="24" y="40" width="72" height="56" rx="6" fill="url(#cup)" stroke="#9b59b6" stroke-width="2"/>
  <!-- Coffee surface -->
  <rect x="30" y="46" width="60" height="12" rx="3" fill="#e8d5f5" opacity="0.3"/>
  <!-- Handle -->
  <path d="M96 52 Q120 52 120 68 Q120 84 96 84" fill="none" stroke="#9b59b6" stroke-width="4" stroke-linecap="round"/>
  <!-- Steam lines -->
  <path d="M44 36 Q40 26 44 16" fill="none" stroke="#b8a0d4" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M64 36 Q60 24 64 12" fill="none" stroke="#b8a0d4" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M84 36 Q80 26 84 16" fill="none" stroke="#b8a0d4" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Lightning bolt (speed) -->
  <polygon points="68,60 58,80 66,80 60,98 80,74 70,74 76,60" fill="#f1c40f" opacity="0.9"/>
</svg>
